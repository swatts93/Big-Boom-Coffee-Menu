<!DOCTYPE html>
<!--
  STATIC PORTRAIT MENU — Light Theme (Lunch, outdoor/bright environment)
  Open in Chrome → F11 for fullscreen on the vertical TV.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Big Boom Coffee Company — Lunch Menu (Light)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Oswald:wght@400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange:    #e07828;
      --orange-lt: #f0983c;
      --sage:      #8a9560;
      --sage-lt:   #b8c88a;
      --surface:   #1a1008;
      --surface2:  #2a1a0c;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #fdf5e4;
      color: #1a0800;
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 36px;
      background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
      border-bottom: 4px solid var(--orange);
      gap: 16px;
      color: #fff;
    }
    .hdr-brand { display: flex; align-items: center; gap: 16px; }
    .hdr-logo  { height: 80px; }
    .hdr-title {
      font-family: 'Playfair Display', serif;
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      line-height: 1;
      color: #fff;
    }
    .hdr-title span { color: var(--orange-lt); }
    .hdr-hours {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      color: var(--sage-lt);
      letter-spacing: 0.8px;
      text-align: right;
    }

    /* ── Two-column layout ──────────────────────────────── */
    #columns {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      position: relative;
      --orange:   #bf5200;
      --orange-lt:#d46010;
      --sage-lt:  #3d5c18;
      --muted:    #5c3010;
      --divider:  rgba(140, 70, 0, 0.28);
    }
    #columns::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('BBCCCream.svg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.12;
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }
    .col {
      padding: 28px 26px 20px;
      border-right: 2px solid var(--divider);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .col:last-child { border-right: none; }
    .col:nth-child(2) { background: rgba(0,0,0,0.025); }

    /* ── Section header ─────────────────────────────────── */
    .sec-title {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 900;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
    }
    .sec-note {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      color: var(--sage-lt);
      letter-spacing: 1.5px;
      margin-top: 5px;
    }
    .sec-rule {
      height: 2px;
      background: linear-gradient(to right, var(--orange), transparent);
      margin: 10px 0 14px;
    }
    .sub-label {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--sage-lt);
      padding-bottom: 5px;
      border-bottom: 1px dashed var(--divider);
      margin: 10px 0 8px;
    }

    /* ── Items ───────────────────────────────────────────── */
    .item { margin-bottom: 10px; }
    .item-top { display: flex; align-items: baseline; gap: 6px; }
    .item-name {
      font-family: 'Lato', sans-serif;
      font-size: 24px;
      font-weight: 700;
      flex: 1;
      line-height: 1.15;
      color: #1a0800;
    }
    .item-mod {
      font-family: 'Lato', sans-serif;
      font-size: 17px;
      font-style: italic;
      color: var(--sage-lt);
    }
    .item-price {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--orange);
    }
    .item-sizes {
      font-family: 'Lato', sans-serif;
      font-size: 19px;
      color: var(--muted);
      margin-top: 2px;
    }
    .item-sizes b { color: var(--orange); font-weight: 700; }
    .item-desc {
      font-family: 'Lato', sans-serif;
      font-size: 17px;
      font-style: italic;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.3;
    }
    .item.special {
      background: linear-gradient(135deg,
        rgba(190,80,0,0.08) 0%,
        rgba(80,110,30,0.05) 100%);
      border: 1px solid rgba(180,75,0,0.45);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 0;
    }
    .item.special .item-name { color: var(--orange); font-size: 32px; }
    .item.special .item-desc {
      font-style: normal;
      font-size: 17px;
      margin-top: 6px;
      line-height: 1.9;
      color: var(--muted);
    }
    .item-note {
      font-family: 'Oswald', sans-serif;
      font-size: 17px;
      letter-spacing: 0.8px;
      color: var(--sage-lt);
      margin-top: 5px;
    }
    .badge {
      display: inline-block;
      background: var(--sage-lt);
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 9px;
      border-radius: 3px;
      margin-left: 6px;
    }
    .sold-out { opacity: 0.38; }

    /* ── LIT TEA levels ──────────────────────────────────── */
    .lit-levels { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
    .lit-level {
      font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      background: rgba(191,82,0,0.12); border: 1px solid rgba(191,82,0,0.45);
      color: var(--orange); padding: 3px 9px; border-radius: 3px;
    }

    .item-desc b { font-style: normal; font-weight: 700; color: #1a0800; }

    /* ── Sub-category note ───────────────────────────────── */
    .sub-note {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 16px; font-weight: 400; font-style: italic;
      color: var(--muted); text-transform: none;
      letter-spacing: 0; margin-top: 3px;
    }

    /* ── Bottled drink logo tiles ────────────────────────── */
    .drinks-sep { margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--divider); }
    .kids-drinks-sep { margin-top: 14px; padding-top: 10px; border-top: 1px dashed var(--divider); }
    .sec-divider { margin-top: 20px; }
    .drink-logos { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .drink-tile {
      display: flex; align-items: center; justify-content: center;
      width: 110px; height: 70px; border-radius: 8px; padding: 10px 8px; overflow: hidden;
      border: 1px solid rgba(0,0,0,0.10);
    }
    .drink-tile img { max-width: 100%; max-height: 48px; object-fit: contain; }
    .drink-note { font-family: 'Lato', sans-serif; font-size: 14px; font-style: italic; color: var(--sage-lt); margin-top: 6px; }
  </style>
</head>
<body>

<header id="header">
  <div class="hdr-brand">
    <img src="BBCCGreen.svg" class="hdr-logo" alt="">
    <div class="hdr-title">Big <span>Boom</span> Coffee</div>
  </div>
  <div class="hdr-hours">Open 5:00am – 2:00pm</div>
</header>

<div id="columns"></div>

<script>
  const COFFEE = {id:"coffee",title:"Coffee & Drinks",note:null,items:[
    {id:"drip-coffee",name:"Drip Coffee",sizes:[{label:"12oz",price:"2.49"},{label:"16oz",price:"2.99"},{label:"20oz",price:"3.49"},{label:"24oz",price:"3.99"}]},
    {id:"latte",name:"Latte",note:"Hot or Iced",sizes:[{label:"12oz",price:"4.49"},{label:"16oz",price:"4.99"},{label:"20oz",price:"5.49"},{label:"24oz",price:"5.99"}]},
    {id:"mocha",name:"Mocha",note:"Hot or Iced",sizes:[{label:"12oz",price:"4.49"},{label:"16oz",price:"4.99"},{label:"20oz",price:"5.49"},{label:"24oz",price:"5.99"}]},
    {id:"americano",name:"Americano",sizes:[{label:"12oz",price:"3.49"},{label:"16oz",price:"3.99"}]},
    {id:"cappuccino",name:"Cappuccino",sizes:[{label:"12oz",price:"4.49"}]},
    {id:"mocha-frappe",name:"Mocha Frappe",sizes:[{label:"16oz",price:"5.75"},{label:"20oz",price:"6.75"}]},
    {id:"espresso",name:"Espresso",sizes:[{label:"Single",price:"2.99"},{label:"Double",price:"4.99"}]},
    {id:"tea",name:"Tea",sizes:[{label:"16oz",price:"2.49"},{label:"20oz",price:"2.79"},{label:"32oz",price:"3.49"}]},
    {id:"lit-tea",name:"LIT TEA!!!",price:"7.99",description:"<b>Cherry Boom</b> (Cherry/Lemonade) \u00b7 <b>Firecracker Punch</b> (Fruit Punch) \u00b7 <b>Blue Bomb</b> (Blue Raspberry) \u00b7 <b>Fourth of July</b> (Blue Raspberry/Cherry)",levels:["No Lit (0mg)","Not So Lit (35mg)","Lit (115mg)","Boosted (200mg)"],special:true},
    {id:"bottled-drinks",name:"Bottled Drinks",price:"2.25",sectionGap:true,note:"Diet and Zero options available",logos:[
      {name:"Pepsi",img:"logodrinks/extracted/pepsi-logo-svg-vector.svg",bg:"#ffffff"},
      {name:"Coca-Cola",img:"logodrinks/extracted/coca-cola-logo-svg-vector.svg",bg:"#ffffff"},
      {name:"Dr Pepper",img:"logodrinks/extracted/dr-pepper-logo/dr-pepper-logo.svg",bg:"#ffffff"},
      {name:"Sunkist",img:"logodrinks/extracted/sunkist-2-logo-svg-vector.svg",bg:"#ffffff"},
      {name:"A&W",img:"logodrinks/extracted/a-w-root-beer-logo-svg-vector.svg",bg:"#ffffff"},
      {name:"Mtn Dew",img:"logodrinks/extracted/mountain-dew-6-logo-svg-vector.svg",bg:"#ffffff"},
    ]},
    {id:"water",name:"Water",price:"1.00",description:"Dasani"},
    {id:"kids-drinks",name:"Kids Drinks",price:"1.50",kidsSep:true,description:"Motts Apple Juice \u00b7 Motts Apple White Grape Juice \u00b7 Sunny D"}
  ]};
  const LUNCH = {id:"lunch",title:"Lunch",note:"Served from 10:30am",items:[
    {id:"paninis",name:"Paninis",price:"9.49",description:"Turkey, Ham or Roast Beef \u00b7 Cheese & Boom Sauce"},
    {id:"garden-salad",name:"Garden Salad",price:"7.99",description:"Spring Mix, Cheese, Tomatoes"},
    {id:"blt",name:"BLT",price:"8.99",description:"Spring Mix, Bacon, Lettuce, Tomato"},
    {id:"club-salad",name:"Club Salad",price:"10.49",description:"Ham, Bacon, Lettuce, Tomato"},
    {id:"chicken-salad",name:"Chicken Salad",price:"10.49",description:"Chicken, Bacon, Lettuce, Tomato"},
    {id:"lunch-combo",name:"Lunch Combo",price:"13.49",description:"Choice of Sandwich, Chips & Drink"},
    {id:"kids-lunch",name:"Kids Lunch",price:"5.99",description:"Grilled Cheese, Chips & Drink"},
    {id:"kids-chicken-fingers",name:"Kids Chicken Fingers",price:"5.99",description:"4pc Chicken Fingers, Chips & Drink"},
    {id:"soup",name:"Soup of the Day",price:null,badge:"Coming Soon!"},
  ]};
  const BAKERY = {id:"bakery",title:"Bakery",note:null,items:[
    {id:"scones",name:"Scones",price:"3.79",description:"Chocolate · Blueberry · Flavor of the Day"},
    {id:"muffins",name:"Banana Nut Muffins",price:"3.99"}
  ]};

  function buildCol(section) {
    let html = `<div class="sec-title">${section.title}</div>
      ${section.note ? `<span class="sec-note">${section.note}</span>` : ''}
      <div class="sec-rule"></div>`;
    let lastSub = null;
    section.items.forEach(item => {
      if (item.subCategory && item.subCategory !== lastSub) {
        lastSub = item.subCategory;
        const n = item.subCategoryNote ? `<span class="sub-note">${item.subCategoryNote}</span>` : '';
        html += `<div class="sub-label">${item.subCategory}${n}</div>`;
      }
      if (item.logos) {
        html += `<div class="item${item.sectionGap?' drinks-sep':''}"><div class="item-top"><span class="item-name">${item.name}</span><span style="flex:1"></span>${item.price?`<span class="item-price">$${item.price}</span>`:''}</div><div class="drink-logos">${item.logos.map(l=>`<div class="drink-tile" style="background:${l.bg}" title="${l.name}"><img src="${l.img}" alt="${l.name}"></div>`).join('')}</div>${item.note?`<div class="drink-note">${item.note}</div>`:''}</div>`;
      } else {
        const extraCls = item.kidsSep ? ' kids-drinks-sep' : '';
        const cls = ['item', item.special && 'special', item.soldOut && 'sold-out'].filter(Boolean).join(' ') + extraCls;
        if (item.sizes) {
          html += `<div class="${cls}"><div class="item-top"><span class="item-name">${item.name}</span>${item.note?`<span class="item-mod">${item.note}</span>`:''}</div><div class="item-sizes">${item.sizes.map(s=>`${s.label}&nbsp;<b>$${s.price}</b>`).join(' &middot; ')}</div></div>`;
        } else {
          const desc = item.description ? (item.special ? item.description.split(' \u00b7 ').join('<br>') : item.description) : null;
          html += `<div class="${cls}"><div class="item-top"><span class="item-name">${item.name}</span>${item.badge?`<span class="badge">${item.badge}</span>`:''}<span style="flex:1"></span>${item.price?`<span class="item-price">$${item.price}</span>`:''}</div>${desc?`<div class="item-desc">${desc}</div>`:''}${item.levels&&item.levels.length?`<div class="lit-levels">${item.levels.map(l=>`<span class="lit-level">${l}</span>`).join('')}</div>`:''}${item.note&&!item.sizes&&!item.levels?`<div class="item-note">${item.note}</div>`:''}</div>`;
        }
      }
    });
    return html;
  }

  [[COFFEE], [LUNCH, BAKERY]].forEach(sections => {
    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML = sections.map((s, i) => (i > 0 ? '<div class="sec-divider"></div>' : '') + buildCol(s)).join('');
    document.getElementById('columns').appendChild(col);
  });
</script>
</body>
</html>
