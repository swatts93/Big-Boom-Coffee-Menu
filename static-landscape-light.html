<!DOCTYPE html>
<!--
  STATIC LANDSCAPE MENU — Light Theme (outdoor/bright environment)
  Open in Chrome → F11 for fullscreen on the landscape TV.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Big Boom Coffee Company — Menu (Light)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Oswald:wght@400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange:    #e07828;
      --orange-lt: #f0983c;
      --sage:      #8a9560;
      --sage-lt:   #b8c88a;
      --surface:   #1a1008;
      --surface2:  #2a1a0c;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Bright outdoor theme ────────────────────────────── */
    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #fdf5e4;
      color: #1a0800;
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header — keep dark for brand identity ───────────── */
    #header {
      flex-shrink: 0;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
      border-bottom: 4px solid var(--orange);
      gap: 24px;
      color: #fff;
    }
    .hdr-brand { display: flex; align-items: center; gap: 18px; }
    .hdr-logo  { height: 74px; }
    .hdr-title {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
    }
    .hdr-title span { color: var(--orange-lt); }
    .hdr-hours {
      font-family: 'Oswald', sans-serif;
      font-size: 21px;
      color: var(--sage-lt);
      letter-spacing: 0.5px;
      flex: 1;
      text-align: center;
    }

    /* ── Columns ────────────────────────────────────────── */
    #columns {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      overflow: hidden;
      position: relative;
      /* Scoped tokens for dark-on-light content */
      --orange:   #bf5200;
      --orange-lt:#d46010;
      --sage-lt:  #3d5c18;
      --muted:    #5c3010;
      --divider:  rgba(140, 70, 0, 0.28);
    }
    #columns::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('BBCCCream.svg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.12;
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 0;
    }
    .col {
      padding: 26px 38px 20px;
      border-right: 2px solid var(--divider);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .col:last-child { border-right: none; }
    .col:nth-child(2) { background: rgba(0,0,0,0.025); }

    /* ── Section header ──────────────────────────────────── */
    .sec-title {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 900;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .sec-note {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      color: var(--sage-lt);
      letter-spacing: 1.5px;
      margin-top: 4px;
    }
    .sec-rule {
      height: 2px;
      background: linear-gradient(to right, var(--orange), transparent);
      margin: 10px 0 16px;
    }
    .sub-label {
      font-family: 'Oswald', sans-serif;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--sage-lt);
      padding-bottom: 5px;
      border-bottom: 1px dashed var(--divider);
      margin: 12px 0 8px;
    }

    /* ── Items ───────────────────────────────────────────── */
    .item { margin-bottom: 8px; }
    .item-top { display: flex; align-items: baseline; gap: 6px; }
    .item-name {
      font-family: 'Lato', sans-serif;
      font-size: 24px;
      font-weight: 700;
      flex: 1;
      line-height: 1.15;
      color: #1a0800;
    }
    .item-mod {
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-style: italic;
      color: var(--sage-lt);
    }
    .item-price {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--orange);
    }
    .item-sizes {
      font-family: 'Lato', sans-serif;
      font-size: 18px;
      color: var(--muted);
      margin-top: 2px;
    }
    .item-sizes b { color: var(--orange); font-weight: 700; }
    .item-desc {
      font-family: 'Lato', sans-serif;
      font-size: 17px;
      font-style: italic;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.3;
    }
    .item.special {
      background: linear-gradient(135deg,
        rgba(190,80,0,0.08) 0%,
        rgba(80,110,30,0.05) 100%);
      border: 1px solid rgba(180,75,0,0.45);
      border-radius: 8px;
      padding: 11px 14px;
      margin-bottom: 0;
    }
    .item.special .item-name { color: var(--orange); font-size: 28px; }
    .item.special .item-desc {
      font-style: normal;
      font-size: 16px;
      margin-top: 5px;
      line-height: 1.9;
      color: var(--muted);
    }
    .item-note {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      letter-spacing: 0.8px;
      color: var(--sage-lt);
      margin-top: 4px;
    }
    .badge {
      display: inline-block;
      background: var(--sage-lt);
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 9px;
      border-radius: 3px;
      margin-left: 6px;
    }
    .sold-out { opacity: 0.38; }

    /* ── Coffee oz-grid ──────────────────────────────────── */
    .cg-table { width: 100%; border-collapse: collapse; margin-bottom: 6px; }
    .cg-sz-hdr {
      font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 500;
      color: var(--sage-lt); text-align: right; width: 63px;
      padding-bottom: 3px; letter-spacing: 0.5px;
    }
    .cg-name-cell { padding: 6px 0; }
    .cg-name {
      font-family: 'Lato', sans-serif; font-size: 24px; font-weight: 700;
      color: #1a0800;
    }
    .cg-imod { font-family: 'Lato', sans-serif; font-size: 13px; color: var(--sage-lt); font-style: italic; }
    .cg-price {
      font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700;
      color: var(--orange); text-align: right; vertical-align: middle; padding-left: 6px;
    }

    /* ── LIT TEA levels ──────────────────────────────────── */
    .lit-levels { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .lit-level {
      font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      background: rgba(191,82,0,0.10); border: 1px solid rgba(191,82,0,0.40);
      color: var(--orange); padding: 3px 8px; border-radius: 3px;
    }

    /* ── Sub-category note ───────────────────────────────── */
    .sub-note {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 15px; font-weight: 400; font-style: italic;
      color: var(--muted); text-transform: none;
      letter-spacing: 0; margin-top: 2px;
    }
  </style>
</head>
<body>

<header id="header">
  <div class="hdr-brand">
    <img src="BBCCGreen.svg" class="hdr-logo" alt="">
    <div class="hdr-title">Big <span>Boom</span> Coffee Company</div>
  </div>
  <div class="hdr-hours">Open 5:00am – 2:00pm &nbsp;·&nbsp; Lunch served from 10:30am</div>
</header>

<div id="columns"></div>

<script>
  const MENU = {sections:[
    {id:"coffee",title:"Coffee & Drinks",note:null,items:[
      {id:"drip-coffee",name:"Drip Coffee",sizes:[{label:"12oz",price:"3.49"},{label:"16oz",price:"2.99"},{label:"20oz",price:"3.49"},{label:"24oz",price:"3.99"}]},
      {id:"latte",name:"Latte",note:"Hot or Iced",sizes:[{label:"12oz",price:"4.49"},{label:"16oz",price:"4.99"},{label:"20oz",price:"5.49"},{label:"24oz",price:"5.99"}]},
      {id:"mocha",name:"Mocha",note:"Hot or Iced",sizes:[{label:"12oz",price:"4.49"},{label:"16oz",price:"4.99"},{label:"20oz",price:"5.49"},{label:"24oz",price:"5.99"}]},
      {id:"americano",name:"Americano",sizes:[{label:"12oz",price:"3.49"},{label:"16oz",price:"3.99"}]},
      {id:"cappuccino",name:"Cappuccino",sizes:[{label:"12oz",price:"4.49"}]},
      {id:"mocha-frappe",name:"Mocha Frappe",sizes:[{label:"16oz",price:"5.75"},{label:"20oz",price:"6.75"}]},
      {id:"espresso",name:"Espresso",sizes:[{label:"Single",price:"2.99"},{label:"Double",price:"4.99"}]},
      {id:"tea",name:"Tea",sizes:[{label:"16oz",price:"2.49"},{label:"20oz",price:"2.79"},{label:"32oz",price:"3.49"}]},
      {id:"lit-tea",name:"LIT TEA!!!",price:"7.99",description:"Cherry Boom (Cherry/Lemonade) \u00b7 Firecracker Punch (Fruit Punch) \u00b7 Blue Bomb (Blue Raspberry) \u00b7 Fourth of July (Blue Raspberry/Cherry)",levels:["No Lit","Not So Lit","Lit","Boosted"],special:true},
      {id:"scones",name:"Scones",price:"3.79",description:"Chocolate \u00b7 Blueberry \u00b7 Flavor of the Day",subCategory:"Bakery"},
      {id:"muffins",name:"Banana Nut Muffins",price:"3.99",subCategory:"Bakery"}
    ]},
    {id:"breakfast",title:"Breakfast",note:"Served 5:00am \u2013 10:30am",items:[
      {id:"breakfast-burrito",name:"Breakfast Burrito",price:"6.49",description:"Bacon or Sausage",subCategory:"Burritos & Sandwiches",subCategoryNote:"All include Eggs & Cheese"},
      {id:"big-boom-burrito",name:"Big Boom Burrito",price:"6.99",description:"Sausage, Bacon, Gravy, Potatoes",subCategory:"Burritos & Sandwiches"},
      {id:"flaky-boom",name:"The Flaky Boom",price:"6.49",description:"Croissant, Bacon or Sausage",subCategory:"Burritos & Sandwiches"},
      {id:"breakfast-biscuit",name:"The Breakfast Biscuit",price:"6.49",description:"Biscuit, Bacon or Sausage",subCategory:"Burritos & Sandwiches"},
      {id:"kids-breakfast",name:"Kids Breakfast",price:"5.99",description:"Biscuit, Bacon or Sausage",subCategory:"Burritos & Sandwiches"},
      {id:"breakfast-bowl",name:"Breakfast Bowl",price:"6.99",description:"Bacon or Sausage",subCategory:"Bowls",subCategoryNote:"All include Eggs & Cheese"},
      {id:"big-breakfast-bowl",name:"Big Breakfast Bowl",price:"7.99",description:"Sausage, Bacon, Gravy, Potatoes",subCategory:"Bowls"},
      {id:"biscuits-gravy",name:"Biscuits & Gravy Bowl",price:"7.49",description:"Biscuit, Gravy",subCategory:"Bowls"},
      {id:"grits-bowl",name:"Grits Bowl",price:"7.49",description:"Bacon or Sausage",subCategory:"Bowls"}
    ]},
    {id:"lunch",title:"Lunch",note:"Served from 10:30am",items:[
      {id:"paninis",name:"Paninis",price:"9.49",description:"Turkey, Ham or Roast Beef \u00b7 Cheese & Boom Sauce"},
      {id:"garden-salad",name:"Garden Salad",price:"7.99",description:"Spring Mix, Cheese, Tomatoes"},
      {id:"blt",name:"BLT",price:"8.99",description:"Spring Mix, Bacon, Lettuce, Tomato"},
      {id:"club-salad",name:"Club Salad",price:"10.49",description:"Ham, Bacon, Lettuce, Tomato"},
      {id:"chicken-salad",name:"Chicken Salad",price:"10.49",description:"Chicken, Bacon, Lettuce, Tomato"},
      {id:"lunch-combo",name:"Lunch Combo",price:"13.49",description:"Choice of Sandwich, Chips & Drink"},
      {id:"kids-lunch",name:"Kids Lunch",price:"5.99",description:"Grilled Cheese, Chips & Drink"},
      {id:"soup",name:"Soup of the Day",price:null,badge:"Coming Soon!"}
    ]}
  ]};

  const OZ_COLS = ['12oz', '16oz', '20oz', '24oz'];
  function isOzGridItem(item) {
    return item.sizes && item.sizes.length > 0 && item.sizes.every(s => OZ_COLS.includes(s.label));
  }

  function itemHTML(item) {
    const cls = ['item', item.special && 'special', item.soldOut && 'sold-out'].filter(Boolean).join(' ');
    if (item.sizes && item.sizes.length) {
      return `<div class="${cls}"><div class="item-top"><span class="item-name">${item.name}</span>${item.note?`<span class="item-mod">${item.note}</span>`:''}</div><div class="item-sizes">${item.sizes.map(s=>`${s.label}&nbsp;<b>$${s.price}</b>`).join(' &middot; ')}</div></div>`;
    }
    const desc = item.description ? (item.special ? item.description.split(' \u00b7 ').join('<br>') : item.description) : null;
    return `<div class="${cls}"><div class="item-top"><span class="item-name">${item.name}</span>${item.badge?`<span class="badge">${item.badge}</span>`:''}<span style="flex:1"></span>${item.price?`<span class="item-price">$${item.price}</span>`:''}</div>${desc?`<div class="item-desc">${desc}</div>`:''}${item.levels&&item.levels.length?`<div class="lit-levels">${item.levels.map(l=>`<span class="lit-level">${l}</span>`).join('')}</div>`:''}${item.note&&!item.sizes&&!item.levels?`<div class="item-note">${item.note}</div>`:''}</div>`;
  }

  function render() {
    const container = document.getElementById('columns');
    MENU.sections.forEach(section => {
      const col = document.createElement('div');
      col.className = 'col';
      let html = `<div class="sec-title">${section.title}</div>${section.note?`<span class="sec-note">${section.note}</span>`:''}<div class="sec-rule"></div>`;

      if (section.id === 'coffee') {
        const gridItems  = section.items.filter(isOzGridItem);
        const otherItems = section.items.filter(i => !isOzGridItem(i));
        const usedCols = OZ_COLS.filter(col => gridItems.some(item => item.sizes.find(s => s.label === col)));
        html += `<table class="cg-table"><thead><tr><th></th>${usedCols.map(c=>`<th class="cg-sz-hdr">${c}</th>`).join('')}</tr></thead><tbody>`;
        gridItems.forEach(item => {
          html += `<tr${item.soldOut?' class="sold-out"':''}><td class="cg-name-cell"><span class="cg-name">${item.name}</span>${item.note?`<span class="cg-imod"> — ${item.note}</span>`:''}</td>${usedCols.map(c=>{const s=item.sizes.find(sz=>sz.label===c);return`<td class="cg-price">${s?`$${s.price}`:''}</td>`;}).join('')}</tr>`;
        });
        html += `</tbody></table>`;
        let lastSub = null;
        otherItems.forEach(item => {
          if (item.subCategory && item.subCategory !== lastSub) {
            lastSub = item.subCategory;
            html += `<div class="sub-label">${item.subCategory}</div>`;
          }
          html += itemHTML(item);
        });
      } else {
        let lastSub = null;
        section.items.forEach(item => {
          if (item.subCategory && item.subCategory !== lastSub) {
            lastSub = item.subCategory;
            const n = item.subCategoryNote ? `<span class="sub-note">${item.subCategoryNote}</span>` : '';
            html += `<div class="sub-label">${item.subCategory}${n}</div>`;
          }
          html += itemHTML(item);
        });
      }

      col.innerHTML = html;
      container.appendChild(col);
    });
  }
  render();
</script>
</body>
</html>
