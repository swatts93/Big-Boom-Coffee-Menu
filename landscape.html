<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Big Boom Coffee Company — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Oswald:wght@400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Layout ───────────────────────────────────────────── */
    body {
      width: 1920px;
      height: 1080px;
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      background: linear-gradient(180deg, var(--brown-lg) 0%, var(--brown-md) 100%);
      border-bottom: 3px solid var(--orange);
      gap: 24px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    .header-logo {
      height: 74px;
      width: auto;
      border-radius: 6px;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 900;
      color: var(--cream);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .header-title span { color: var(--orange); }

    .header-hours {
      font-family: 'Oswald', sans-serif;
      font-size: 21px;
      font-weight: 400;
      color: var(--sage-lt);
      letter-spacing: 0.5px;
      text-align: center;
      flex: 1;
    }


    /* ── Columns ──────────────────────────────────────────── */
    #columns {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      overflow: hidden;
      position: relative;
    }

    /* ── Logo watermark ───────────────────────────────────── */
    #columns::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('Logo.jpeg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }

    .col {
      padding: 18px 32px 14px;
      border-right: 2px solid var(--divider);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .col:last-child { border-right: none; }
    .col:nth-child(2) { background: rgba(255,255,255,0.012); }

    /* ── Section header ───────────────────────────────────── */
    .sec-title {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 900;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
    }

    .sec-note {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--sage-lt);
      letter-spacing: 1.5px;
      margin-top: 4px;
    }

    .sec-rule {
      height: 2px;
      background: linear-gradient(to right, var(--orange), transparent);
      margin: 8px 0 10px;
    }

    /* ── Sub-category label ───────────────────────────────── */
    .sub-label {
      font-family: 'Oswald', sans-serif;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--sage-lt);
      padding-bottom: 4px;
      border-bottom: 1px dashed var(--divider);
      margin: 8px 0 6px;
    }

    /* ── Menu item ────────────────────────────────────────── */
    .item {
      margin-bottom: 7px;
    }

    .item-top {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .item-name {
      font-family: 'Lato', sans-serif;
      font-size: 27px;
      font-weight: 700;
      color: var(--cream);
      flex: 1;
      line-height: 1.15;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    .item-mod {
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-style: italic;
      color: var(--sage-lt);
      flex-shrink: 0;
    }

    .item-price {
      font-family: 'Oswald', sans-serif;
      font-size: 27px;
      font-weight: 700;
      color: var(--orange);
      flex-shrink: 0;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    .item-sizes {
      font-family: 'Lato', sans-serif;
      font-size: 18px;
      color: var(--cream-dim);
      margin-top: 2px;
    }

    .item-sizes b {
      color: var(--orange);
      font-weight: 700;
    }

    .item-desc {
      font-family: 'Lato', sans-serif;
      font-size: 18px;
      font-style: italic;
      color: var(--text-muted);
      margin-top: 2px;
      line-height: 1.3;
    }

    /* ── LIT TEA special card ─────────────────────────────── */
    .item.special {
      background: linear-gradient(135deg,
        rgba(212,113,42,0.14) 0%,
        rgba(138,149,96,0.09) 100%);
      border: 1px solid rgba(212,113,42,0.42);
      border-radius: 8px;
      padding: 11px 14px;
      margin-bottom: 0;
    }

    .item.special .item-name {
      color: var(--orange-lt);
      font-size: 28px;
    }

    .item.special .item-desc {
      font-style: normal;
      font-size: 16px;
      margin-top: 5px;
    }

    .item-note {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      letter-spacing: 0.8px;
      color: var(--sage-lt);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <header id="header">
    <div class="header-brand">
      <img src="Logo.jpeg" class="header-logo" alt="">
      <div class="header-title">Big <span>Boom</span> Coffee Company</div>
    </div>
    <div class="header-hours">Open 5:00am – 2:00pm &nbsp;·&nbsp; Lunch served from 10:30am</div>
  </header>

  <div id="columns"></div>

  <script src="js/config.js"></script>
  <script src="js/menu-data.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script>
    // ── Render helpers ────────────────────────────────────
    function sizesHTML(sizes) {
      return sizes.map(s => `${s.label}&nbsp;<b>$${s.price}</b>`).join(' &middot; ');
    }

    function itemHTML(item) {
      const cls = ['item', item.special && 'special', item.soldOut && 'sold-out']
        .filter(Boolean).join(' ');

      if (item.sizes && item.sizes.length) {
        return `
          <div class="${cls}">
            <div class="item-top">
              <span class="item-name">${item.name}</span>
              ${item.note ? `<span class="item-mod">${item.note}</span>` : ''}
            </div>
            <div class="item-sizes">${sizesHTML(item.sizes)}</div>
          </div>`;
      }

      return `
        <div class="${cls}">
          <div class="item-top">
            <span class="item-name">${item.name}</span>
            ${item.badge ? `<span class="badge">${item.badge}</span>` : ''}
            <span style="flex:1"></span>
            ${item.price ? `<span class="item-price">$${item.price}</span>` : ''}
          </div>
          ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
          ${item.note && !item.sizes ? `<div class="item-note">${item.note}</div>` : ''}
        </div>`;
    }

    function sectionHTML(section) {
      const visibleItems = section.items.filter(i => !i.hidden);
      let html = `
        <div class="sec-title">${section.title}</div>
        ${section.note ? `<span class="sec-note">${section.note}</span>` : ''}
        <div class="sec-rule"></div>`;

      let lastSub = null;
      visibleItems.forEach(item => {
        if (item.subCategory && item.subCategory !== lastSub) {
          lastSub = item.subCategory;
          html += `<div class="sub-label">${item.subCategory}</div>`;
        }
        html += itemHTML(item);
      });

      return html;
    }

    function render(menu) {
      const container = document.getElementById('columns');
      container.innerHTML = '';
      menu.sections.forEach(section => {
        const col = document.createElement('div');
        col.className = 'col';
        col.innerHTML = sectionHTML(section);
        container.appendChild(col);
      });
    }

    // ── Firebase / data loading ───────────────────────────
    if (firebaseConfig.apiKey !== 'YOUR_API_KEY') {
      try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('menu').on('value', snap => {
          const raw = snap.val();
          if (raw) {
            render(normalizeMenu(raw));
          } else {
            db.ref('menu').set(DEFAULT_MENU);
            render(DEFAULT_MENU);
          }
        }, () => render(DEFAULT_MENU));
      } catch (e) {
        render(DEFAULT_MENU);
      }
    } else {
      render(DEFAULT_MENU);
    }
  </script>
</body>
</html>
