<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Big Boom Coffee Company — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Oswald:wght@400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style id="theme-vars"></style>
  <style>
    :root {
      --orange:    #e07828;
      --orange-lt: #f0983c;
      --sage:      #8a9560;
      --sage-lt:   #b8c88a;
      --rust:      #a84b28;
      --bg:        #080401;
      --surface:   #1a1008;
      --surface2:  #2a1a0c;
      --divider:   rgba(224,120,40,0.30);
      --text:      #ffffff;
      --muted:     #e0c898;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
      border-bottom: 3px solid var(--orange);
      gap: 24px;
    }
    .hdr-brand { display: flex; align-items: center; gap: 18px; }
    .hdr-logo  { height: 74px; }
    .hdr-title {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
    }
    .hdr-title span { color: var(--orange-lt); }
    .hdr-hours {
      font-family: 'Oswald', sans-serif;
      font-size: 21px;
      color: var(--sage-lt);
      letter-spacing: 0.5px;
      flex: 1;
      text-align: center;
    }

    /* ── Columns ────────────────────────────────────────── */
    #columns {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      overflow: hidden;
      position: relative;
    }
    #columns::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('BBCCWhite.svg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }
    .col {
      padding: 26px 38px 20px;
      border-right: 2px solid var(--divider);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .col:last-child { border-right: none; }
    .col:nth-child(2) { background: rgba(255,255,255,0.012); }

    /* ── Section header ──────────────────────────────────── */
    .sec-title {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 900;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .sec-note {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      color: var(--sage-lt);
      letter-spacing: 1.5px;
      margin-top: 4px;
    }
    .sec-rule {
      height: 2px;
      background: linear-gradient(to right, var(--orange), transparent);
      margin: 10px 0 16px;
    }
    .sub-label {
      font-family: 'Oswald', sans-serif;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--sage-lt);
      padding-bottom: 5px;
      border-bottom: 1px dashed var(--divider);
      margin: 12px 0 8px;
    }

    /* ── Items ───────────────────────────────────────────── */
    .item { margin-bottom: 8px; }
    .item-top { display: flex; align-items: baseline; gap: 6px; }
    .item-name {
      font-family: 'Lato', sans-serif;
      font-size: 24px;
      font-weight: 700;
      flex: 1;
      line-height: 1.15;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }
    .item-mod {
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-style: italic;
      color: var(--sage-lt);
    }
    .item-price {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--orange);
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }
    .item-sizes {
      font-family: 'Lato', sans-serif;
      font-size: 18px;
      color: var(--muted);
      margin-top: 2px;
    }
    .item-sizes b { color: var(--orange); font-weight: 700; }
    .item-desc {
      font-family: 'Lato', sans-serif;
      font-size: 18px;
      font-style: italic;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.3;
    }
    .item.special {
      background: linear-gradient(135deg, rgba(224,120,40,0.14), rgba(138,149,96,0.09));
      border: 1px solid rgba(224,120,40,0.42);
      border-radius: 8px;
      padding: 11px 14px;
      margin-bottom: 0;
    }
    .item.special .item-name { color: var(--orange-lt); font-size: 28px; }
    .item.special .item-desc { font-style: normal; font-size: 16px; margin-top: 5px; line-height: 1.9; }
    .item-desc b { font-style: normal; font-weight: 700; color: var(--text, #fff); }
    .item-note {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      letter-spacing: 0.8px;
      color: var(--sage-lt);
      margin-top: 4px;
    }
    .badge {
      display: inline-block;
      background: var(--sage);
      color: var(--bg);
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 9px;
      border-radius: 3px;
      margin-left: 6px;
    }
    .sold-out { opacity: 0.38; }

    /* ── Coffee oz-grid ──────────────────────────────────── */
    .cg-table { width: 100%; border-collapse: collapse; margin-bottom: 6px; }
    .cg-sz-hdr {
      font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 500;
      color: var(--sage-lt); text-align: right; width: 63px;
      padding-bottom: 3px; letter-spacing: 0.5px;
    }
    .cg-name-cell { padding: 6px 0; }
    .cg-name {
      font-family: 'Lato', sans-serif; font-size: 24px; font-weight: 700;
      color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }
    .cg-imod { font-family: 'Lato', sans-serif; font-size: 13px; color: var(--sage-lt); font-style: italic; }
    .cg-price {
      font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700;
      color: var(--orange); text-align: right; vertical-align: middle; padding-left: 6px;
    }

    /* ── LIT TEA levels ──────────────────────────────────── */
    .lit-levels { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .lit-level {
      font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      background: rgba(224,120,40,0.20); border: 1px solid rgba(224,120,40,0.50);
      color: var(--orange-lt); padding: 3px 8px; border-radius: 3px;
    }

    /* ── Sub-category note ───────────────────────────────── */
    .sub-note {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 15px; font-weight: 400; font-style: italic;
      color: var(--muted); text-transform: none;
      letter-spacing: 0; margin-top: 2px;
    }

    /* ── Bottled drink logo tiles ────────────────────────── */
    .drinks-sep { margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--divider); }
    .kids-drinks-sep { margin-top: 14px; padding-top: 10px; border-top: 1px dashed var(--divider); }
    .drink-logos { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 7px; }
    .drink-tile {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 70px; height: 50px; border-radius: 6px; padding: 5px 5px 3px; overflow: hidden;
    }
    .drink-tile img { max-width: 100%; max-height: 30px; object-fit: contain; filter: brightness(0) invert(1); }
    .drink-note { font-family: 'Lato', sans-serif; font-size: 14px; font-style: italic; color: var(--sage-lt); margin-top: 6px; }
    /* ── Stacked sections in same column ─────────────────── */
    .sec-divider { margin-top: 20px; }
  </style>
</head>
<body>

<header id="header">
  <div class="hdr-brand">
    <img src="BBCCGreen.svg" class="hdr-logo" alt="">
    <div class="hdr-title">Big <span>Boom</span> Coffee Company</div>
  </div>
  <div class="hdr-hours">Open 5:00am – 2:00pm &nbsp;·&nbsp; Lunch served from 10:30am</div>
</header>

<div id="columns"></div>

<script src="js/themes.js"></script>
<script src="js/menu-data.js"></script>
<script>
  const OZ_COLS = ['12oz', '16oz', '20oz', '24oz'];

  function isOzGridItem(item) {
    return item.sizes && item.sizes.length > 0 && item.sizes.every(s => OZ_COLS.includes(s.label));
  }

  function itemHTML(item) {
    const extraCls = (item.kidsSep ? ' kids-drinks-sep' : '') + (item.sectionGap ? ' drinks-sep' : '');
    const cls = ['item', item.special && 'special', item.soldOut && 'sold-out'].filter(Boolean).join(' ') + extraCls;
    if (item.sizes && item.sizes.length) {
      return `<div class="${cls}"><div class="item-top"><span class="item-name">${item.name}</span>${item.note ? `<span class="item-mod">${item.note}</span>` : ''}</div><div class="item-sizes">${item.sizes.map(s => `${s.label}&nbsp;<b>$${s.price}</b>`).join(' &middot; ')}</div></div>`;
    }
    const desc = item.description ? (item.special ? item.description.split(' · ').join('<br>') : item.description) : null;
    return `<div class="${cls}"><div class="item-top"><span class="item-name">${item.name}</span>${item.badge ? `<span class="badge">${item.badge}</span>` : ''}<span style="flex:1"></span>${item.price ? `<span class="item-price">$${item.price}</span>` : ''}</div>${desc ? `<div class="item-desc">${desc}</div>` : ''}${item.levels && item.levels.length ? `<div class="lit-levels">${item.levels.map(l => `<span class="lit-level">${l}</span>`).join('')}</div>` : ''}${item.note && !item.sizes && !item.levels ? `<div class="item-note">${item.note}</div>` : ''}</div>`;
  }

  function buildSection(section) {
    const visible = section.items.filter(i => !i.hidden);
    let html = `<div class="sec-title">${section.title}</div>${section.note ? `<span class="sec-note">${section.note}</span>` : ''}<div class="sec-rule"></div>`;
    if (section.id === 'coffee') {
      const gridItems  = visible.filter(isOzGridItem);
      const otherItems = visible.filter(i => !isOzGridItem(i));
      const usedCols   = OZ_COLS.filter(col => gridItems.some(item => item.sizes.find(s => s.label === col)));
      html += `<table class="cg-table"><thead><tr><th></th>${usedCols.map(c => `<th class="cg-sz-hdr">${c}</th>`).join('')}</tr></thead><tbody>`;
      gridItems.forEach(item => {
        html += `<tr${item.soldOut ? ' class="sold-out"' : ''}><td class="cg-name-cell"><span class="cg-name">${item.name}</span>${item.note ? `<span class="cg-imod"> — ${item.note}</span>` : ''}</td>${usedCols.map(c => { const s = item.sizes.find(sz => sz.label === c); return `<td class="cg-price">${s ? `$${s.price}` : ''}</td>`; }).join('')}</tr>`;
      });
      html += `</tbody></table>`;
      let lastSub = null;
      otherItems.forEach(item => {
        if (item.subCategory && item.subCategory !== lastSub) { lastSub = item.subCategory; html += `<div class="sub-label">${item.subCategory}</div>`; }
        html += itemHTML(item);
      });
    } else {
      let lastSub = null;
      visible.forEach(item => {
        if (item.subCategory && item.subCategory !== lastSub) {
          lastSub = item.subCategory;
          const n = item.subCategoryNote ? `<span class="sub-note">${item.subCategoryNote}</span>` : '';
          html += `<div class="sub-label">${item.subCategory}${n}</div>`;
        }
        html += itemHTML(item);
      });
    }
    return html;
  }

  function render(menu) {
    const container = document.getElementById('columns');
    container.innerHTML = '';
    const sections = menu.sections;
    // Col 1: Coffee · Col 2: Breakfast · Col 3: Lunch + Bakery stacked
    [sections.slice(0, 1), sections.slice(1, 2), sections.slice(2)].forEach(grp => {
      const col = document.createElement('div');
      col.className = 'col';
      col.innerHTML = grp.map((s, i) => (i > 0 ? '<div class="sec-divider"></div>' : '') + buildSection(s)).join('');
      container.appendChild(col);
    });
  }

  // ── Theme ───────────────────────────────────────────────
  function applyTheme(key) {
    const theme = THEMES[key] || THEMES.dark;
    document.getElementById('theme-vars').textContent = theme.css;
  }

  // ── Data loading — polls server every 30s ───────────────
  function loadMenu() {
    fetch('/api/menu')
      .then(r => r.json())
      .then(data => {
        const menu = normalizeMenu(data);
        applyTheme(menu.theme);
        render(menu);
      })
      .catch(() => render(DEFAULT_MENU));
  }
  loadMenu();
  setInterval(loadMenu, 30000);
</script>
</body>
</html>
