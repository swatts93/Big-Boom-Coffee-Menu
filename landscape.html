<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1.0">
  <title>Big Boom Coffee Company — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Oswald:wght@400;500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Layout ───────────────────────────────────────────── */
    body {
      width: 1920px;
      height: 1080px;
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 44px;
      background: linear-gradient(180deg, var(--brown-lg) 0%, var(--brown-md) 100%);
      border-bottom: 3px solid var(--orange);
      gap: 24px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    .header-logo {
      height: 74px;
      width: auto;
      border-radius: 6px;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 900;
      color: var(--cream);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .header-title span { color: var(--orange); }

    .header-hours {
      font-family: 'Oswald', sans-serif;
      font-size: 21px;
      font-weight: 400;
      color: var(--sage-lt);
      letter-spacing: 0.5px;
      text-align: center;
      flex: 1;
    }


    /* ── Columns ──────────────────────────────────────────── */
    #columns {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      overflow: hidden;
      position: relative;
    }

    /* ── Logo watermark ───────────────────────────────────── */
    #columns::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('Logo.jpeg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }

    .col {
      padding: 14px 28px 10px;
      border-right: 2px solid var(--divider);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .col:last-child { border-right: none; }
    .col:nth-child(2) { background: rgba(255,255,255,0.012); }

    /* ── Section header ───────────────────────────────────── */
    .sec-title {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 900;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
    }

    .sec-note {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--sage-lt);
      letter-spacing: 1.5px;
      margin-top: 4px;
    }

    .sec-rule {
      height: 2px;
      background: linear-gradient(to right, var(--orange), transparent);
      margin: 6px 0 8px;
    }

    /* ── Sub-category label ───────────────────────────────── */
    .sub-label {
      font-family: 'Oswald', sans-serif;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--sage-lt);
      padding-bottom: 3px;
      border-bottom: 1px dashed var(--divider);
      margin: 5px 0 4px;
    }

    /* ── Menu item ────────────────────────────────────────── */
    .item {
      margin-bottom: 5px;
    }

    .item-top {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .item-name {
      font-family: 'Lato', sans-serif;
      font-size: 27px;
      font-weight: 700;
      color: var(--cream);
      flex: 1;
      line-height: 1.15;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    .item-mod {
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-style: italic;
      color: var(--sage-lt);
      flex-shrink: 0;
    }

    .item-price {
      font-family: 'Oswald', sans-serif;
      font-size: 27px;
      font-weight: 700;
      color: var(--orange);
      flex-shrink: 0;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }

    .item-sizes {
      font-family: 'Lato', sans-serif;
      font-size: 18px;
      color: var(--cream-dim);
      margin-top: 2px;
    }

    .item-sizes b {
      color: var(--orange);
      font-weight: 700;
    }

    .item-desc {
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-style: italic;
      color: var(--text-muted);
      margin-top: 1px;
      line-height: 1.25;
    }

    /* ── LIT TEA special card ─────────────────────────────── */
    .item.special {
      background: linear-gradient(135deg,
        rgba(212,113,42,0.14) 0%,
        rgba(138,149,96,0.09) 100%);
      border: 1px solid rgba(212,113,42,0.42);
      border-radius: 8px;
      padding: 11px 14px;
      margin-bottom: 0;
    }

    .item.special .item-name {
      color: var(--orange-lt);
      font-size: 28px;
    }

    .item.special .item-desc {
      font-style: normal;
      font-size: 16px;
      margin-top: 5px;
    }
    .item-desc b { font-style: normal; font-weight: 700; color: var(--text); }

    .item-note {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      letter-spacing: 0.8px;
      color: var(--sage-lt);
      margin-top: 4px;
    }

    /* ── Coffee oz-grid ──────────────────────────────────── */
    .cg-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 6px;
    }
    .cg-sz-hdr {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--sage-lt);
      text-align: right;
      width: 78px;
      padding-bottom: 5px;
      letter-spacing: 0.5px;
    }
    .cg-name-cell { padding: 8px 0; }
    .cg-name {
      font-family: 'Lato', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--cream);
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }
    .cg-imod {
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      color: var(--sage-lt);
      font-style: italic;
    }
    .cg-price {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--orange);
      text-align: right;
      vertical-align: middle;
      padding-left: 6px;
    }

    /* ── LIT TEA levels ──────────────────────────────────── */
    .lit-levels {
      display: flex;
      gap: 5px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .lit-level {
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(224,120,40,0.20);
      border: 1px solid rgba(224,120,40,0.50);
      color: var(--orange-lt);
      padding: 3px 8px;
      border-radius: 3px;
    }

    /* ── Sub-category note (own line below label) ───────── */
    .sub-note {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      font-weight: 400;
      font-style: italic;
      color: var(--cream-dim);
      text-transform: none;
      letter-spacing: 0;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <header id="header">
    <div class="header-brand">
      <img src="Logo.jpeg" class="header-logo" alt="">
      <div class="header-title">Big <span>Boom</span> Coffee Company</div>
    </div>
    <div class="header-hours">Open 5:00am – 2:00pm &nbsp;·&nbsp; Lunch served from 10:30am</div>
  </header>

  <div id="columns"></div>

  <script src="js/menu-data.js"></script>
  <script>
    // ── Coffee oz-grid ────────────────────────────────────
    const OZ_COLS = ['12oz', '16oz', '20oz', '24oz'];

    function isOzGridItem(item) {
      return item.sizes && item.sizes.length > 0 &&
        item.sizes.every(s => OZ_COLS.includes(s.label));
    }

    function coffeeSectionHTML(section) {
      const visibleItems = section.items.filter(i => !i.hidden);
      const gridItems  = visibleItems.filter(isOzGridItem);
      const otherItems = visibleItems.filter(i => !isOzGridItem(i));

      let html = `
        <div class="sec-title">${section.title}</div>
        ${section.note ? `<span class="sec-note">${section.note}</span>` : ''}
        <div class="sec-rule"></div>`;

      // Only show columns that at least one item uses
      const usedCols = OZ_COLS.filter(col =>
        gridItems.some(item => item.sizes.find(s => s.label === col))
      );

      html += `<table class="cg-table"><thead><tr>
        <th></th>
        ${usedCols.map(col => `<th class="cg-sz-hdr">${col}</th>`).join('')}
      </tr></thead><tbody>`;

      gridItems.forEach(item => {
        const rowCls = item.soldOut ? ' class="sold-out"' : '';
        html += `<tr${rowCls}>
          <td class="cg-name-cell">
            <span class="cg-name">${item.name}</span>
            ${item.note ? `<span class="cg-imod"> — ${item.note}</span>` : ''}
          </td>
          ${usedCols.map(col => {
            const s = item.sizes.find(sz => sz.label === col);
            return `<td class="cg-price">${s ? `$${s.price}` : ''}</td>`;
          }).join('')}
        </tr>`;
      });

      html += `</tbody></table>`;

      // Non-grid items (Espresso, Tea, LIT TEA)
      otherItems.forEach(item => { html += itemHTML(item); });

      return html;
    }

    // ── Render helpers ────────────────────────────────────
    function sizesHTML(sizes) {
      return sizes.map(s => `${s.label}&nbsp;<b>$${s.price}</b>`).join(' &middot; ');
    }

    function itemHTML(item) {
      const cls = ['item', item.special && 'special', item.soldOut && 'sold-out']
        .filter(Boolean).join(' ');

      if (item.sizes && item.sizes.length) {
        return `
          <div class="${cls}">
            <div class="item-top">
              <span class="item-name">${item.name}</span>
              ${item.note ? `<span class="item-mod">${item.note}</span>` : ''}
            </div>
            <div class="item-sizes">${sizesHTML(item.sizes)}</div>
          </div>`;
      }

      return `
        <div class="${cls}">
          <div class="item-top">
            <span class="item-name">${item.name}</span>
            ${item.badge ? `<span class="badge">${item.badge}</span>` : ''}
            <span style="flex:1"></span>
            ${item.price ? `<span class="item-price">$${item.price}</span>` : ''}
          </div>
          ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
          ${item.levels && item.levels.length ? `<div class="lit-levels">${item.levels.map(l => `<span class="lit-level">${l}</span>`).join('')}</div>` : ''}
          ${item.note && !item.sizes && !item.levels ? `<div class="item-note">${item.note}</div>` : ''}
        </div>`;
    }

    function sectionHTML(section) {
      if (section.id === 'coffee') return coffeeSectionHTML(section);

      const visibleItems = section.items.filter(i => !i.hidden);
      let html = `
        <div class="sec-title">${section.title}</div>
        ${section.note ? `<span class="sec-note">${section.note}</span>` : ''}
        <div class="sec-rule"></div>`;

      let lastSub = null;
      visibleItems.forEach(item => {
        if (item.subCategory && item.subCategory !== lastSub) {
          lastSub = item.subCategory;
          const noteSpan = item.subCategoryNote
            ? `<span class="sub-note">${item.subCategoryNote}</span>` : '';
          html += `<div class="sub-label">${item.subCategory}${noteSpan}</div>`;
        }
        html += itemHTML(item);
      });

      return html;
    }

    function render(menu) {
      const container = document.getElementById('columns');
      container.innerHTML = '';
      menu.sections.forEach(section => {
        const col = document.createElement('div');
        col.className = 'col';
        col.innerHTML = sectionHTML(section);
        container.appendChild(col);
      });
    }

    // ── Data loading — polls server every 30s ─────────────
    function loadMenu() {
      fetch('/api/menu')
        .then(r => r.json())
        .then(data => render(normalizeMenu(data)))
        .catch(() => render(DEFAULT_MENU));
    }
    loadMenu();
    setInterval(loadMenu, 30000);
  </script>
</body>
</html>
